data:
  raw_path: data/raw
  processed_path: data/processed
  test_size: 0.2
  val_size: 0.1
  random_state: 42
model:
  name: mlp
  input_dim: 63
  num_classes: 10
  hidden_dims:
  - 128
  - 64
  dropout: 0.3
train:
  epochs: 50
  batch_size: 32
  lr: 0.001
  weight_decay: 0.0001
  device: auto
  seed: 42
  patience: 10
output:
  model_path: models/best_model.pt
  log_interval: 10